<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Particle Text Interactive</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div id="canvas-container"></div>
    
    <div class="control-panel">
      <div class="panel-header">
        <h2>particle controls</h2>
        <p class="subtitle">by You</p>
      </div>
      
      <div class="control-group">
        <h3>Particle Size</h3>
        <div class="knob-row">
          <div class="knob-container">
            <div id="sizeSmall" class="knob">
              <div class="knob-indicator"></div>
            </div>
            <label>Small<br><span id="sizeSmallValue">3</span></label>
          </div>
          
          <div class="knob-container">
            <div id="sizeLarge" class="knob">
              <div class="knob-indicator"></div>
            </div>
            <label>Large<br><span id="sizeLargeValue">6</span></label>
          </div>
        </div>
      </div>
      
      <div class="control-group">
        <h3>Reaction Distance</h3>
        <div class="knob-row">
          <div class="knob-container">
            <div id="nearDist" class="knob">
              <div class="knob-indicator"></div>
            </div>
            <label>Near<br><span id="nearDistValue">100</span></label>
          </div>
          
          <div class="knob-container">
            <div id="midDist" class="knob">
              <div class="knob-indicator"></div>
            </div>
            <label>Mid<br><span id="midDistValue">250</span></label>
          </div>
        </div>
      </div>
      
      <div class="control-group">
        <h3>Force Settings</h3>
        <div class="knob-row">
          <div class="knob-container">
            <div id="forceNear" class="knob">
              <div class="knob-indicator"></div>
            </div>
            <label>Near<br><span id="forceNearValue">6</span></label>
          </div>
          
          <div class="knob-container">
            <div id="forceMid" class="knob">
              <div class="knob-indicator"></div>
            </div>
            <label>Mid<br><span id="forceMidValue">0.05</span></label>
          </div>
        </div>
      </div>
      
      <div class="control-group">
        <h3>Movement</h3>
        <div class="knob-row">
          <div class="knob-container">
            <div id="textSpread" class="knob">
              <div class="knob-indicator"></div>
            </div>
            <label>Spread<br><span id="textSpreadValue">0</span></label>
          </div>
          
          <div class="knob-container">
            <div id="moveForce" class="knob">
              <div class="knob-indicator"></div>
            </div>
            <label>Speed<br><span id="moveForceValue">0.05</span></label>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="sketch.js"></script>
</body>
</html>
